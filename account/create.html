<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/x-icon" href="/assets/moonapp.svg">
    <title>Create account | MoonApp</title>
</head>
<style>
    body{
        background-image: linear-gradient(45deg, #3f3cff,#3cffae);
        font-family: Arial, Helvetica, sans-serif;
    }
    div{
        text-align: center;
        position: absolute;
        background-color: #000000cc;
        top: 50%;
        left: 50%;
        transform: translate(-50%,-50%);
        border-radius: 15px;
        padding: 40px;
        padding-top: 10px;
        padding-bottom: 30px;
        color: white;
    }
    input{
        padding: 15px;
        border: none;
        font-size: 15px;
        outline: none;
        width: 88%
    }
    button{
        background-color: dodgerblue;
        border: none;
        border-radius: 5px;
        padding: 15px;
        width: 100%;
        font-size: 15px;
        color: rgb(0, 0, 0);
        cursor: pointer;
    }
    button:hover{
        background-color: deepskyblue;
    }
</style>
<body>
    <div>
        <h2>Área de cadastro</h2>
        <input type="text" required="required" placeholder="Nome de usuário">
        <br><br>
        <input type="email" required="required" placeholder="Email">
        <br><br>
        <input type="password" required="required" placeholder="Senha">
        <br><br>
        <button>Cadastrar</button>
        <br><br>
        <a href="MoonApp-1.0.0/account/login.html" style="color: #6aafff">Já tem uma conta? Faça login!</a>
    </div>
</body>
</html>
